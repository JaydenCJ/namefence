<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real namefence session (output copied verbatim
       from a container run on 2026-07-12; paths shortened for width). -->
  <rect width="1060" height="600" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">namefence — will these names survive the sync?</text>

  <g fill="#adbac7">
    <text x="24" y="64"><tspan fill="#6cb6ff">$</tspan> namefence check ~/Sync</text>
    <text x="24" y="90"><tspan fill="#f47067">aux.txt: error NF001 (windows-reserved-name)</tspan>: reserved DOS device stem `AUX`</text>
    <text x="24" y="112" fill="#768390">    fix: rename to `aux_.txt`</text>
    <text x="24" y="138"><tspan fill="#f47067">docs/readme.md: error NF006 (case-collision)</tspan>: collides with sibling `README.md`</text>
    <text x="24" y="164"><tspan fill="#e0b543">photos/café.jpg: warning NF008 (non-nfc)</tspan>: not NFC-normalized</text>
    <text x="24" y="186" fill="#768390">    fix: rename to `café.jpg` (same look, portable bytes)</text>
    <text x="24" y="212"><tspan fill="#f47067">photos/café.jpg: error NF007 (normalization-collision)</tspan>: same text as its sibling</text>
    <text x="24" y="234" fill="#768390">    (8 code points vs 9 — NFC and NFD encodings of one name)</text>
    <text x="24" y="260"><tspan fill="#f47067">report:final.csv: error NF002 (windows-illegal-char)</tspan>: contains `:`</text>
    <text x="24" y="282" fill="#768390">    fix: rename to `report-final.csv`</text>
    <text x="24" y="310" fill="#909dab">findings: 5 — 4 error(s), 1 warning(s), 0 info; 6 file(s), 2 directory(ies) scanned</text>

    <text x="24" y="360"><tspan fill="#6cb6ff">$</tspan> namefence fix --apply ~/Sync</text>
    <text x="24" y="386"><tspan fill="#57ab5a">renamed</tspan> `docs/readme.md` -> `readme-2.md`  <tspan fill="#768390">(NF006/NF007)</tspan></text>
    <text x="24" y="408"><tspan fill="#57ab5a">renamed</tspan> `photos/café.jpg` -> `café-2.jpg`  <tspan fill="#768390">(NF008)</tspan></text>
    <text x="24" y="430"><tspan fill="#57ab5a">renamed</tspan> `aux.txt` -> `aux_.txt`  <tspan fill="#768390">(NF001)</tspan></text>
    <text x="24" y="452"><tspan fill="#57ab5a">renamed</tspan> `report:final.csv` -> `report-final.csv`  <tspan fill="#768390">(NF002)</tspan></text>
    <text x="24" y="474" fill="#909dab">applied 4 rename(s)</text>

    <text x="24" y="522"><tspan fill="#6cb6ff">$</tspan> namefence check ~/Sync</text>
    <text x="24" y="548"><tspan fill="#57ab5a">findings: none</tspan> — 6 file(s), 2 directory(ies) scanned</text>
    <text x="24" y="576" fill="#768390"># exit 0 — safe to sync</text>
  </g>
</svg>
